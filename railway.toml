[build]
builder = "nixpacks"
buildCommand = "mkdir -p backend/app/static && cd frontend && npm install && npm run build && cd .. && cp -r frontend/dist/* backend/app/static/"

[deploy]
startCommand = "cd backend && gunicorn -w 4 -b 0.0.0.0:$PORT 'app.main:create_app(\"production\")'"

[env]
PYTHON_VERSION = "3.11"
NODE_VERSION = "20"
DEBUG = "false"
